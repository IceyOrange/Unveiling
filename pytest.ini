[pytest]
testpaths = tests
markers =
    e2e: end-to-end tests that hit real external APIs (DeepSeek, Serper). Skipped by default. Run with: pytest -m e2e
addopts = -ra --strict-markers -m "not e2e"
filterwarnings =
    ignore::DeprecationWarning:langgraph.*
    ignore::pytest.PytestDeprecationWarning
