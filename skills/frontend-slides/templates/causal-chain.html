<!--
  Causal Chain Layout Template

  Layout: Validated vs Rejected commonalities
  Validated: green checkmark + causal chain description + confidence bar
  Rejected: red cross + rejection reason + confounding variable

  Used for: Causal validation slides
-->
<div style="max-height: min(65vh, 550px); overflow-y: auto;">
  <!-- Validated -->
  <div style="display: flex; gap: var(--element-gap); align-items: flex-start; margin-bottom: var(--element-gap);">
    <span style="color: #22c55e; font-size: var(--h3-size);">&#10003;</span>
    <div style="flex: 1;">
      <p style="font-size: var(--body-size); font-weight: 600;">{commonality}</p>
      <p style="font-size: var(--small-size); opacity: 0.7;">Causal chain: {causal_chain}</p>
      <!-- Confidence bar -->
      <div style="margin-top: 0.3em; height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden;">
        <div style="height: 100%; width: {confidence_pct}%; background: #22c55e;"></div>
      </div>
      <p style="font-size: var(--small-size); opacity: 0.5;">Confidence: {confidence}</p>
    </div>
  </div>

  <!-- Rejected -->
  <div style="display: flex; gap: var(--element-gap); align-items: flex-start; margin-bottom: var(--element-gap); opacity: 0.6;">
    <span style="color: #ef4444; font-size: var(--h3-size);">&#10007;</span>
    <div style="flex: 1;">
      <p style="font-size: var(--body-size); text-decoration: line-through;">{commonality}</p>
      <p style="font-size: var(--small-size); opacity: 0.7;">Rejected: {rejection_reason}</p>
      <p style="font-size: var(--small-size); opacity: 0.5;">Confounding variable: {confounding_variable}</p>
    </div>
  </div>
</div>
