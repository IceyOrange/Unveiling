<!--
  Causal Chain Layout Template (Unveiling-aligned)

  Layout: 站得住 vs 站不住 的共通点
  站得住: forest checkmark + 怎么推导出来的 + 分量
  站不住: oxblood cross + 被推翻是因为 (合并掉原 Confounding variable，过分技术)

  Variable mapping (route user-visible strings through UNVEILING_VOCAB.md):
    {commonality}        — 这一条共通点
    {causal_chain}       — 一句话说清这个共通点怎么推出来的
    {confidence_pct}     — 0-100, 用于进度条宽度
    {confidence_label}   — VOCAB: strong→最有分量 / medium→中等 / weak→较弱
    {rejection_reason}   — 为什么这条不成立（已合并原 confounding_variable）

  Used for: 因果链检验类比 slides
-->
<div style="max-height: min(65vh, 550px); overflow-y: auto;">
  <!-- 站得住 -->
  <div style="display: flex; gap: var(--element-gap); align-items: flex-start; margin-bottom: var(--element-gap);">
    <span style="color: var(--status-closed); font-size: var(--h3-size);">&#10003;</span>
    <div style="flex: 1;">
      <p style="font-size: var(--body-size); font-weight: 600;">{commonality}</p>
      <p style="font-size: var(--small-size); opacity: 0.7;">怎么推导出来的:{causal_chain}</p>
      <!-- Confidence bar -->
      <div style="margin-top: 0.3em; height: 4px; background: var(--bg-sand); border-radius: 2px; overflow: hidden;">
        <div style="height: 100%; width: {confidence_pct}%; background: var(--status-closed);"></div>
      </div>
      <p style="font-size: var(--small-size); opacity: 0.5;">分量:{confidence_label}</p>
    </div>
  </div>

  <!-- 站不住 -->
  <div style="display: flex; gap: var(--element-gap); align-items: flex-start; margin-bottom: var(--element-gap); opacity: 0.6;">
    <span style="color: var(--status-stuck); font-size: var(--h3-size);">&#10007;</span>
    <div style="flex: 1;">
      <p style="font-size: var(--body-size); text-decoration: line-through;">{commonality}</p>
      <p style="font-size: var(--small-size); opacity: 0.7;">被推翻是因为:{rejection_reason}</p>
    </div>
  </div>
</div>
