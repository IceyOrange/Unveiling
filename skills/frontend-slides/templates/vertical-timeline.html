<!--
  Vertical Timeline Layout Template (Unveiling-aligned)

  Layout: Chronological timeline with nodes
  Each node: era label + instance name + brief description
  Nodes connected by a vertical ink line (not the orange accent — orange is only for tension)

  Variable mapping (route user-visible strings through UNVEILING_VOCAB.md):
    {era_label}         — 时期名 (e.g. 1849 黄金热 / 19世纪末电报革命)
    {instance_name}     — 那个时期的具体例子
    {brief_description} — 一句话说清这个例子里发生了什么

  Used for: Vertical (cross-period) analogy results — typically Mode D's
  "我们换过几次角度" or evidence-by-period slides.
-->
<div style="position: relative; padding-left: clamp(60px, 10vw, 120px);">
  <!-- Vertical connecting line — ink color, not accent -->
  <div style="position: absolute; left: clamp(50px, 9vw, 110px); top: 0; bottom: 0; width: 2px; background: var(--ink-primary); opacity: 0.25;"></div>

  <!-- Timeline node -->
  <div style="display: flex; gap: clamp(0.5rem, 1.5vw, 1rem); align-items: flex-start; margin-bottom: var(--content-gap); position: relative;">
    <!-- Era dot — ink color, not accent -->
    <div style="position: absolute; left: calc(-1 * clamp(50px, 9vw, 110px) + clamp(44px, 8vw, 104px)); top: 0.3em; width: 12px; height: 12px; border-radius: 50%; background: var(--ink-primary);"></div>
    <!-- Content -->
    <div>
      <p style="font-size: var(--small-size); font-weight: 700; opacity: 0.6;">{era_label}</p>
      <p style="font-size: var(--body-size); font-weight: 600;">{instance_name}</p>
      <p style="font-size: var(--small-size); opacity: 0.7;">{brief_description}</p>
    </div>
  </div>
</div>
