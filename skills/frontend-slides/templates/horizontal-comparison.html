<!--
  Horizontal Comparison Layout Template

  Layout: Two-column side-by-side comparison
  Left: Original topic characteristics
  Right: Cross-domain instance characteristics
  Color-coded matching between shared features

  Used for: Horizontal comparison slides
-->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--content-gap);">
  <!-- Original Topic Card -->
  <div style="background: var(--bg-secondary); padding: clamp(0.75rem, 2vw, 1.5rem); border-radius: 8px; border-top: 3px solid var(--accent);">
    <p style="font-size: var(--small-size); opacity: 0.5;">ORIGINAL TOPIC</p>
    <p style="font-size: var(--h3-size); font-weight: 700;">{topic_name}</p>
    <ul class="feature-list" style="margin-top: var(--element-gap);">
      <li>{feature_1}</li>
      <li>{feature_2}</li>
      <li>{feature_3}</li>
    </ul>
  </div>
  <!-- Cross-Domain Instance Card -->
  <div style="background: var(--bg-secondary); padding: clamp(0.75rem, 2vw, 1.5rem); border-radius: 8px; border-top: 3px solid var(--accent);">
    <p style="font-size: var(--small-size); opacity: 0.5;">{domain_name}</p>
    <p style="font-size: var(--h3-size); font-weight: 700;">{instance_name}</p>
    <ul class="feature-list" style="margin-top: var(--element-gap);">
      <li>{feature_1}</li>
      <li>{feature_2}</li>
      <li>{feature_3}</li>
    </ul>
  </div>
</div>
